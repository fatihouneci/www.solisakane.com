server {
    listen 80;

    # Proxy for Next.js frontend
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy for Node.js API
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /image {
        proxy_pass http://server:5000/image;
    }
    
    location /audio {
        proxy_pass http://server:5000/audio;
    }
    
    location /video {
        proxy_pass http://server:5000/video;
    }
    
    location /file {
        proxy_pass http://server:5000/file;
    }
}
