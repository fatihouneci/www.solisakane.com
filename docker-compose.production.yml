version: "3.8"
services:
  mongodb:
    image: mongo:6.0
    container_name: solisakane_db_production
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - db-production-volume:/data/db
      - ./backups:/backups
    networks:
      - solisakane-production
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: solisakane_redis_production
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-production-volume:/data
    networks:
      - solisakane-production
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: solisakane_api_production
    environment:
      - NODE_ENV=production
      - MONGODB_URL=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE}?authSource=admin
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis
      - REDIS_PORT=6379
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - FRONTEND_URL=${FRONTEND_URL}
      - API_URL=${API_URL}
      - FIREBASE_ENABLED=${FIREBASE_ENABLED}
    depends_on:
      - mongodb
      - redis
    restart: always
    ports:
      - "5100:5000"
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    volumes:
      - img-production-volume:/app/uploads
      - ./server/logs:/app/logs
    networks:
      - solisakane-production
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: solisakane_app_production
    restart: always
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${API_URL}
      - VITE_SOCKET_URL=${API_URL}
    depends_on:
      - server
    ports:
      - "3000:3000"
    networks:
      - solisakane-production
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: solisakane_nginx_production
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - server
    volumes:
      - ./nginx/nginx.production.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    networks:
      - solisakane-production
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  db-production-volume:
  img-production-volume:
  redis-production-volume:

networks:
  solisakane-production:
    driver: bridge
