version: "3.8"
services:
  mongodb:
    image: mongo:6.0
    container_name: solisakane_db_staging
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=staging_password_2024
      - MONGO_INITDB_DATABASE=solisakane_staging
    ports:
      - "27017:27017"
    volumes:
      - db-staging-volume:/data/db
    networks:
      - solisakane-staging

  redis:
    image: redis:7-alpine
    container_name: solisakane_redis_staging
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-staging-volume:/data
    networks:
      - solisakane-staging

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: solisakane_api_staging
    environment:
      - NODE_ENV=staging
      - MONGODB_URL=mongodb://admin:staging_password_2024@mongodb:27017/solisakane_staging?authSource=admin
      - PORT=5000
      - JWT_SECRET=STAGING_JWT_SECRET_2024_VERY_SECURE
      - REDIS_URL=redis
      - REDIS_PORT=6379
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USER=your-email@gmail.com
      - EMAIL_PASS=your-app-password
      - FRONTEND_URL=http://localhost:3016
      - API_URL=http://localhost:5100
    depends_on:
      - mongodb
      - redis
    restart: always
    ports:
      - "5100:5000"
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    volumes:
      - img-staging-volume:/app/uploads
      - ./server/logs:/app/logs
    networks:
      - solisakane-staging

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: solisakane_app_staging
    restart: always
    environment:
      - NODE_ENV=staging
      - VITE_API_URL=http://localhost:5100
      - VITE_SOCKET_URL=http://localhost:5100
    depends_on:
      - server
    ports:
      - "3000:3000"
    networks:
      - solisakane-staging

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: solisakane_nginx_staging
    ports:
      - "3016:80"
      - "3017:443"
    depends_on:
      - web
      - server
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/conf.d/default.conf
    networks:
      - solisakane-staging

volumes:
  db-staging-volume:
  img-staging-volume:
  redis-staging-volume:

networks:
  solisakane-staging:
    driver: bridge
